spring:
  application:
    name: stellarfeed-api

  # H2 Database Configuration (In-Memory)
  datasource:
    url: jdbc:h2:mem:streamdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  # SQL Initialization
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour in milliseconds
      cache-null-values: false

# Server Configuration
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json
  
# Logging Configuration
logging:
  level:
    com.stellarfeed.metadata: INFO
    org.springframework.cache: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Application-specific properties
streaming:
  feed:
    provider-name: "StellarFeed Platform"
    version: "1.0"
    cache-ttl-seconds: 3600
